<script>
  window["ai_edge_gallery_get_result"] = async (data) => {
    try {
      let text = "";

      // ✅ handle both string and object
      if (typeof data === "string") {
        try {
          const parsed = JSON.parse(data);
          text = parsed.result || parsed.text || data;
        } catch {
          text = data;
        }
      } else if (data && typeof data === "object") {
        text = data.result || data.text || "";
      }

      text = (text || "").trim();

      if (!text) {
        return JSON.stringify({ result: "No input provided." });
      }

      // 🔥 pass-through (let model expand)
      return JSON.stringify({
        result: text
      });

    } catch (e) {
      return JSON.stringify({ result: "Error: " + e.message });
    }
  };
</script>
