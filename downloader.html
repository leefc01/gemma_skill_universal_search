<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemma Skill Downloader</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f4f7f6; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        button { background: #007AFF; color: white; border: none; padding: 12px 24px; margin: 10px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>Skill Deployment</h1>
    <p>Download the files for your Universal Search Skill.</p>
    
    <button onclick="downloadFile('skill.md', skillContent)">Download skill.md</button>
    <button onclick="downloadFile('index.js', jsContent)">Download index.js</button>
</div>

<script>
const skillContent = `---
name: universal_search
version: 1.2.0
---

# Universal Search Skill

## User Configuration
- **DEFAULT_ENGINE:** "google" 
- **FALLBACK_ORDER:** ["google", "tavily", "brave"]
- **VOICE_CONCISE_MODE:** true

## Tool Definition
\`\`\`json
{
  "name": "universal_search",
  "description": "Searches the live web. Uses a waterfall fallback if the primary engine fails.",
  "parameters": {
    "type": "object",
    "properties": {
      "query": { "type": "string", "description": "The search query" },
      "provider": { 
        "type": "string", 
        "description": "Optional override. Defaults to user config." 
      }
    },
    "required": ["query"]
  }
}
\`\`\`

## Instructions

1. **Audio Clarity:** When providing answers based on search results, use a natural, conversational tone. Avoid reading URLs or long lists of numbers.

2. **Waterfall Logic:** The logic handles API failures internally. If you receive data from a fallback engine, simply provide the answer; do not apologize for the engine switch unless specifically asked.

3. **On the Go:** Prioritize speed. If the user is asking via voice, keep the final spoken response under 60 words.`;

const jsContent = `/**
 * Universal Search with Waterfall Fallback
 */

const API_KEYS = {
  google: "YOUR_SERPER_KEY",
  tavily: "YOUR_TAVILY_KEY",
  brave: "YOUR_BRAVE_KEY",
  wolfram: "YOUR_WOLFRAM_APP_ID"
};

const PROVIDER_ORDER = ["google", "tavily", "brave"];

async function universal_search({ query, provider }) {
  const searchQueue = provider ? [provider, ...PROVIDER_ORDER.filter(p => p !== provider)] : PROVIDER_ORDER;

  for (const currentProvider of searchQueue) {
    try {
      const data = await executeSearch(currentProvider, query);
      if (data) return data; 
    } catch (e) {
      console.log(\`Provider \${currentProvider} failed: \${e.message}. Trying next...\`);
      continue; 
    }
  }
  return "Error: All search engines failed or keys are invalid.";
}

async function executeSearch(engine, query) {
  let response;
  
  switch (engine) {
    case "google":
      response = await fetch("https://google.serper.dev/search", {
        method: "POST",
        headers: { "X-API-KEY": API_KEYS.google, "Content-Type": "application/json" },
        body: JSON.stringify({ q: query })
      });
      if (!response.ok) throw new Error(response.status);
      const sData = await response.json();
      return sData.organic.map(o => o.snippet).join(" ");

    case "tavily":
      response = await fetch("https://api.tavily.com/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ api_key: API_KEYS.tavily, query })
      });
      if (!response.ok) throw new Error(response.status);
      const tData = await response.json();
      return tData.results.map(r => r.content).join(" ");

    case "brave":
      response = await fetch(\`https://api.search.brave.com/res/v1/web/search?q=\${encodeURIComponent(query)}\`, {
        headers: { "X-Subscription-Token": API_KEYS.brave }
      });
      if (!response.ok) throw new Error(response.status);
      const bData = await response.json();
      return bData.web.results.map(r => r.description).join(" ");

    default:
      return null;
  }
}`;

function downloadFile(filename, text) {
    const element = document.createElement('a');
    element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(text));
    element.setAttribute('download', filename);
    element.style.display = 'none';
    document.body.appendChild(element);
    element.click();
    document.body.removeChild(element);
}
</script>
</body>
</html>
